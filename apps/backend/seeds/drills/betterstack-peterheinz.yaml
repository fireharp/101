- id: betterstack_peter_clean_code_tradeoff_012
  topic: product
  subtopic: clean_code
  difficulty: 3
  trap_type: abstraction_for_its_own_sake
  question_text: >
    What does clean code mean when moving fast on a product team? Keep it
    practical, not philosophical.
  expected_answer:
    must_have: [clear names and small units, tests around risky behavior, simple abstractions that match real duplication]
    nice_to_have: [delete dead code and keep error handling explicit]
    red_flags: [clean code means clever abstractions everywhere]
  rubric:
    must_have: [clear names and small units, tests around risky behavior, simple abstractions that match real duplication]
    nice_to_have: [delete dead code and keep error handling explicit]
    red_flags: [clean code means clever abstractions everywhere]
  canonical_short_answer: >
    Clean code is code the next engineer can safely change: clear domain names,
    small focused functions, tests around risky behavior, explicit error paths,
    and abstractions only when they remove real duplication or complexity. It
    should make product changes faster, not just look clever.
  canonical_deep_answer: null
  examples:
    - use_case: "Refactoring checkout validation"
      why_it_fits: "Clear names and focused tests make future payment changes safer."
      gotcha: "Abstracting before real duplication can make product changes slower."
  tags: [rapid_fundamentals, betterstack, peterheinz, product, code_quality]
  is_active: true
