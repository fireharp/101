- id: rapid_security_csrf_xss_003
  topic: security
  subtopic: csrf
  difficulty: 2
  trap_type: threat_confusion
  question_text: >
    What is the difference between CSRF and XSS, and why does the distinction matter?
  expected_answer:
    must_have: [CSRF sends authenticated browser request, XSS runs attacker script, XSS can bypass CSRF defenses]
    nice_to_have: [SameSite cookies tokens and origin checks]
    red_flags: [CORS prevents CSRF]
  rubric:
    must_have: [CSRF sends authenticated browser request, XSS runs attacker script, XSS can bypass CSRF defenses]
    nice_to_have: [SameSite cookies tokens and origin checks]
    red_flags: [CORS prevents CSRF]
  canonical_short_answer: >
    CSRF tricks a logged-in browser into sending a request; XSS runs attacker
    JavaScript inside your origin. CSRF defenses include SameSite cookies, tokens,
    and origin checks, but XSS can often bypass them because it executes as the site.
  canonical_deep_answer: null
  tags: [rapid_fundamentals, betterstack, security, web]
  is_active: true

