- id: cache_thundering_herd_001
  topic: caching
  subtopic: thundering_herd
  difficulty: 3
  trap_type: stampede
  question_text: >
    A popular product page caches a value that just expired. 10000 requests
    hit at once, all miss, all hammer the database. How do you stop the
    stampede?
  expected_answer:
    must_have:
      - single-flight / request coalescing
      - or stale-while-revalidate
      - or lock around the rebuild
      - one rebuild fills cache for everyone
    nice_to_have:
      - early refresh before expiry
      - probabilistic early expiration
    red_flags:
      - lower TTL globally
      - cache nothing
  rubric:
    must_have:
      - single-flight or lock
      - rebuild once
      - others wait or serve stale
    nice_to_have:
      - probabilistic refresh
      - stale-while-revalidate
    red_flags:
      - blanket TTL lowering
      - just add more replicas
  canonical_short_answer: >
    Coalesce concurrent misses: the first request takes a per-key lock,
    rebuilds the value, fills the cache, releases the lock. Others wait or
    serve the previous stale value. Use stale-while-revalidate or
    probabilistic early refresh so the rebuild happens before everyone is
    waiting.
  canonical_deep_answer: null
  examples:
    - use_case: "Flash-sale product page cache expires under peak traffic."
      why_it_fits: "Single-flight rebuilds the product once while other requests wait or serve stale."
      gotcha: "Lock TTLs must cover rebuild time without wedging the key after crashes."
  tags: [caching, redis, latency]
  is_active: true

- id: cache_write_strategy_002
  topic: caching
  subtopic: write_strategy
  difficulty: 3
  trap_type: write_path
  question_text: >
    Compare write-through, write-back, and write-around caching. When would
    you pick each?
  expected_answer:
    must_have:
      - write-through commits to cache + store synchronously
      - write-back acks fast, persists later, risks loss on crash
      - write-around skips cache on write, fills on miss
      - read/write ratio drives the choice
    nice_to_have:
      - write coalescing in write-back
      - write-around for write-heavy / read-rare
      - concrete examples like inventory metrics and audit logs
    red_flags:
      - one strategy is always right
      - write-back is free
  rubric:
    must_have:
      - three patterns named
      - durability vs latency tradeoff
      - workload-driven choice
    nice_to_have:
      - coalescing
      - failure modes
      - concrete application examples
    red_flags:
      - claim write-back has no risk
      - confuse write-through with write-back
  canonical_short_answer: >
    Write-through writes to cache and store synchronously, consistent but
    slow. Write-back acks from cache, persists later — fast but can lose
    data on crash. Write-around skips the cache on write and fills on miss,
    good for write-heavy data rarely read again. Pick based on durability
    requirements, read-after-write expectations, and the read/write ratio.
  canonical_deep_answer: null
  examples:
    - use_case: "Choosing cache writes for settings, counters, and bulk imports."
      why_it_fits: "Settings need write-through, counters may tolerate write-back, imports fit write-around."
      gotcha: "Write-back is unsafe for data that must survive a cache crash."
  tags: [caching, consistency]
  is_active: true

- id: cache_write_strategy_scenarios_003
  topic: caching
  subtopic: write_strategy
  difficulty: 3
  trap_type: theory_without_scenario
  question_text: >
    Pick cache write strategies for these cases: ecommerce inventory, metrics
    counters, audit log ingestion, and a bulk product import. Explain where the
    wrong choice hurts users or the system.
  expected_answer:
    must_have:
      - write-through fits inventory or payment/order status where stale reads are dangerous
      - write-back fits metrics logs or counters only when delayed durability is acceptable
      - write-around fits audit logs bulk imports or cold writes to avoid cache pollution
      - wrong strategy creates concrete harm like lost payments stale shipping address or evicted hot cache
    nice_to_have:
      - transaction/error-handling caveat for write-through
      - flush/journaling caveat for write-back
      - invalidate or update cache for read-after-write paths
    red_flags:
      - write-back for payments without durability controls
      - cache every bulk import row immediately
  rubric:
    must_have:
      - write-through correctness example
      - write-back throughput example with risk
      - write-around cold-write example
      - concrete failure scenario
    nice_to_have:
      - read-after-write handling
      - cache pollution
    red_flags:
      - no application mapping
      - ignore crash-before-flush
  canonical_short_answer: >
    Use write-through for inventory, payment status, or user settings because
    stale reads can oversell stock, misreport orders, or ship to the wrong
    address. Use write-back for metrics, logs, or counters only when batching and
    delayed durability are acceptable. Use write-around for audit events, cold
    uploads, or bulk imports so rarely-read writes do not evict hot cache keys.
    The decision is durability, read-after-write need, and cache-pollution risk.
  canonical_deep_answer: null
  examples:
    - use_case: "Mapping inventory, metrics counters, audit logs, and product imports."
      why_it_fits: "Each case stresses a different axis: correctness, throughput, durability, or pollution."
      gotcha: "Caching every cold write can evict hot keys and hurt real traffic."
  tags: [caching, consistency, redis, system_design]
  is_active: true
