  subtopic: transactions
  difficulty: 3
  trap_type: retry_logic
  question_text: >
    Summarize Postgres transaction isolation levels and the practical caveat.
  expected_answer:
    must_have: [read committed default, repeatable read snapshot, serializable can abort]
    nice_to_have: [application must retry serialization failures]
    red_flags: [serializable means no retries needed]
  rubric:
    must_have: [read committed default, repeatable read snapshot, serializable can abort]
    nice_to_have: [application must retry serialization failures]
    red_flags: [serializable means no retries needed]
  canonical_short_answer: >
    Read committed sees committed data per statement; repeatable read gives a
    stable snapshot; serializable gives stronger anomaly protection by aborting
    conflicting transactions. The application must handle retries.
