- id: betterstack_peter_rag_bonus_011
  topic: ai
  subtopic: rag
  difficulty: 2
  trap_type: buzzword_answer
  question_text: >
    In 30 seconds, what is RAG and what is one production caveat?
  expected_answer:
    must_have: [retrieve relevant documents, add context to model prompt, hard to pick proper content or too much context can spoil answer]
    nice_to_have: [hard to pick proper content or too much context can spoil answer, cite sources evaluate hallucination risk or guard against prompt injection]
    red_flags: [RAG fine-tunes the model automatically]
  rubric:
    must_have: [retrieve relevant documents, add context to model prompt, hard to pick proper content or too much context can spoil answer]
    nice_to_have: [hard to pick proper content or too much context can spoil answer, cite sources evaluate hallucination risk or guard against prompt injection]
    red_flags: [RAG fine-tunes the model automatically]
  canonical_short_answer: >
    RAG retrieves relevant documents and passes them as context to the model so
    the answer can use current or private knowledge. The caveat is retrieval
    and context quality: stale, irrelevant, malicious, or missing chunks still
    produce bad answers, so evaluate retrieval, guard against prompt injection,
    and cite sources where possible.
  canonical_deep_answer: null
  examples:
    - use_case: "Support bot answering from runbooks"
      why_it_fits: "Retrieval supplies current internal context before generation."
      gotcha: "Bad chunks, stale docs, or prompt injection can still spoil the answer."
