- id: betterstack_peter_regex_boundary_010
  topic: javascript
  subtopic: parsing
  difficulty: 3
  trap_type: regex_overreach
  question_text: >
    When is a regular expression the wrong tool for parsing input? Give a
    concrete example and safer alternative.
  expected_answer:
    must_have: [regex is brittle for nested or grammar-based formats, use parser or structured API, validate edge cases]
    nice_to_have: [regex is fine for small bounded patterns]
    red_flags: [one giant regex is always cleaner]
  rubric:
    must_have: [regex is brittle for nested or grammar-based formats, use parser or structured API, validate edge cases]
    nice_to_have: [regex is fine for small bounded patterns]
    red_flags: [one giant regex is always cleaner]
  canonical_short_answer: >
    Regex is fine for small bounded patterns, but wrong for nested or grammar
    formats like HTML, JSON, SQL, or balanced parentheses. Use a parser or
    structured API, then validate the parsed result and edge cases.
  canonical_deep_answer: null
  examples:
    - use_case: "Parsing nested HTML fragments"
      why_it_fits: "Balanced nesting and escaping are grammar problems, not flat patterns."
      gotcha: "A larger regex usually adds hidden edge-case bugs."
